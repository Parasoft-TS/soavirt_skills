paths:
  /v6/assets/data:
    post:
      tags:
      - assets
      summary: Returns asset search fields
      description: "Returns all search fields, environments, data groups, and the\
        \ user of the resource with the specified [id] corresponding to a .tst, .pva,\
        \ or .pvn file. All search fields of the top-level suite and its descendants\
        \ will be returned. A search field is a customizable text value in the resource\
        \ configuration."
      operationId: assetsPOST_data
      parameters:
      - name: searchFields
        in: query
        description: Search fields will be included for each asset if this parameter
          is set to "true".
        required: false
        schema:
          type: boolean
      - name: environments
        in: query
        description: Environments will be included for each asset if this parameter
          is set to "true".
        required: false
        schema:
          type: boolean
      - name: dataGroups
        in: query
        description: Data group data sources will be included for each asset if this
          parameter is set to "true".
        required: false
        schema:
          type: boolean
      - name: user
        in: query
        description: User will be included for each asset if this parameter is set
          to "true".
        required: false
        schema:
          type: boolean
      requestBody:
        description: Asset identifiers defining the scope.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/assetsDataRequest"
      responses:
        "500":
          description: Internal server error. See the error message for details.
        "404":
          description: The requested item could not be found.
        "403":
          description: Server lacks the appropriate license or the specified operation
            is restricted.
        "401":
          description: You are not authorized to use this API. Please provide a valid
            user name and password at the top of the page.
        "400":
          description: Bad request. Some parameter or payload is invalid. See the
            error message for details.
        "200":
          description: Operation completed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/assetsDataResponse"
  /v6/children:
    get:
      tags:
      - children
      summary: Returns the immediate children of the specified resource
      description: "Returns the immediate children of the resource with the specified\
        \ [id]."
      operationId: childrenGET
      parameters:
      - name: id
        in: query
        description: "The [id] of the resource whose children you would like to retrieve.\
          \  If no [id] is specified, the workspace root is the default."
        required: false
        schema:
          type: string
      - name: type
        in: query
        description: "The [type] of files to include in the list of children.  This\
          \ parameter only filters individual file types and does not exclude directories\
          \ or children of .tst, .pva, or .pvn files.  If not specified, all file\
          \ types will be included."
        required: false
